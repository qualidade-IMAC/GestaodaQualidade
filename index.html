<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel IMAC - Gestão da Qualidade</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Configuração de Cores Customizadas (Tailwind) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'imac-yellow': '#dca900', // Amarelo da barra superior
                        'imac-blue': '#104ea2',   // Azul da logo
                        'imac-text': '#1e3a8a',   // Azul escuro para textos de destaque
                        'imac-subtext': '#64748b',
                    }
                }
            }
        }
    </script>

    <style>
        /* Suavização de fontes */
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-sans">

    <!-- Cabeçalho Amarelo -->
    <header class="bg-imac-yellow pt-6 pb-20 px-4 md:px-8 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            
            <!-- Logo e Título -->
            <div class="flex items-center gap-6">
                <!-- Logo Fixa -->
                <div class="flex items-center justify-center h-16 sm:h-20">
                    <img src="CARINHA AMARELO E IMAC AZUL.png" alt="IMAC Logo" class="h-full w-auto object-contain drop-shadow-md">
                </div>
                <!-- Título da página com ajuste de margem (mt-2) para alinhar visualmente com o texto da logo -->
                <h1 class="text-xl md:text-2xl font-bold text-imac-text mt-2 hidden sm:block">Gestão da Qualidade</h1>
            </div>

        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="flex-grow max-w-6xl mx-auto px-4 md:px-8 w-full -mt-10 relative z-10">
        
        <!-- Grid de Aplicativos -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
            
            <!-- Card 1: Start da Produção -->
            <a href="https://qualidade-imac.github.io/StartProducao/" target="_blank" class="bg-white rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow border border-gray-100 flex flex-col justify-between h-40 group">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-gray-50 text-gray-400 flex items-center justify-center group-hover:bg-blue-50 group-hover:text-imac-blue transition-colors">
                        <i class="ph ph-play-circle text-2xl"></i>
                    </div>
                    <h2 class="font-bold text-gray-800 text-sm tracking-wide uppercase">Start da Produção</h2>
                </div>
                <div class="flex items-center justify-between mt-4">
                    <span class="text-xs font-medium text-gray-400 italic">Acessar</span>
                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-blue-50 group-hover:text-imac-blue transition-colors">
                        <i class="ph ph-arrow-right"></i>
                    </div>
                </div>
            </a>

            <!-- Card 2: Relatórios de Não Conformidade -->
            <a href="https://qualidade-imac.github.io/rnc-imac/" target="_blank" class="bg-white rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow border border-gray-100 flex flex-col justify-between h-40 group">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-gray-50 text-gray-400 flex items-center justify-center group-hover:bg-blue-50 group-hover:text-imac-blue transition-colors">
                        <i class="ph ph-warning text-2xl"></i>
                    </div>
                    <h2 class="font-bold text-gray-800 text-sm tracking-wide uppercase">Relatórios RNC</h2>
                </div>
                <div class="flex items-center justify-between mt-4">
                    <span class="text-xs font-medium text-gray-400 italic">Acessar</span>
                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-blue-50 group-hover:text-imac-blue transition-colors">
                        <i class="ph ph-arrow-right"></i>
                    </div>
                </div>
            </a>

            <!-- Card 3: Gratificação Mensal -->
            <a href="https://qualidade-imac.github.io/gratificacao/" target="_blank" class="bg-white rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow border border-gray-100 flex flex-col justify-between h-40 group">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-gray-50 text-gray-400 flex items-center justify-center group-hover:bg-blue-50 group-hover:text-imac-blue transition-colors">
                        <i class="ph ph-money text-2xl"></i>
                    </div>
                    <h2 class="font-bold text-gray-800 text-sm tracking-wide uppercase">Gratificação Mensal</h2>
                </div>
                <div class="flex items-center justify-between mt-4">
                    <span class="text-xs font-medium text-gray-400 italic">Acessar</span>
                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-blue-50 group-hover:text-imac-blue transition-colors">
                        <i class="ph ph-arrow-right"></i>
                    </div>
                </div>
            </a>

            <!-- Card 4: Checklist -->
            <a href="https://qualidade-imac.github.io/checklistqualidade/" target="_blank" class="bg-white rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow border border-gray-100 flex flex-col justify-between h-40 group">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-gray-50 text-gray-400 flex items-center justify-center group-hover:bg-blue-50 group-hover:text-imac-blue transition-colors">
                        <i class="ph ph-check-square-offset text-2xl"></i>
                    </div>
                    <h2 class="font-bold text-gray-800 text-sm tracking-wide uppercase">Checklist Qualidade</h2>
                </div>
                <div class="flex items-center justify-between mt-4">
                    <span class="text-xs font-medium text-gray-400 italic">Acessar</span>
                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-blue-50 group-hover:text-imac-blue transition-colors">
                        <i class="ph ph-arrow-right"></i>
                    </div>
                </div>
            </a>

            <!-- Card 5: Receitas e Fichas de Custo -->
            <a href="https://qualidade-imac.github.io/FichasdeCusto/" target="_blank" class="bg-white rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow border border-gray-100 flex flex-col justify-between h-40 group">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-gray-50 text-gray-400 flex items-center justify-center group-hover:bg-blue-50 group-hover:text-imac-blue transition-colors">
                        <i class="ph ph-receipt text-2xl"></i>
                    </div>
                    <h2 class="font-bold text-gray-800 text-sm tracking-wide uppercase">Receitas e Custos</h2>
                </div>
                <div class="flex items-center justify-between mt-4">
                    <span class="text-xs font-medium text-gray-400 italic">Acessar</span>
                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-blue-50 group-hover:text-imac-blue transition-colors">
                        <i class="ph ph-arrow-right"></i>
                    </div>
                </div>
            </a>

            <!-- Card 6: Formulário de Desvio -->
            <a href="https://forms.gle/ie1sJYW9EwmbrZTy6" target="_blank" class="bg-white rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow border border-gray-100 flex flex-col justify-between h-40 group">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-gray-50 text-gray-400 flex items-center justify-center group-hover:bg-blue-50 group-hover:text-imac-blue transition-colors">
                        <i class="ph ph-warning-circle text-2xl"></i>
                    </div>
                    <h2 class="font-bold text-gray-800 text-sm tracking-wide uppercase">Formulário de Desvio</h2>
                </div>
                <div class="flex items-center justify-between mt-4">
                    <span class="text-xs font-medium text-gray-400 italic">Acessar</span>
                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-blue-50 group-hover:text-imac-blue transition-colors">
                        <i class="ph ph-arrow-right"></i>
                    </div>
                </div>
            </a>

            <!-- Card 7: Gestão de IT -->
            <a href="https://qualidade-imac.github.io/it-s-imac/" target="_blank" class="bg-white rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow border border-gray-100 flex flex-col justify-between h-40 group">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-gray-50 text-gray-400 flex items-center justify-center group-hover:bg-blue-50 group-hover:text-imac-blue transition-colors">
                        <i class="ph ph-desktop text-2xl"></i>
                    </div>
                    <h2 class="font-bold text-gray-800 text-sm tracking-wide uppercase">Gestão de IT</h2>
                </div>
                <div class="flex items-center justify-between mt-4">
                    <span class="text-xs font-medium text-gray-400 italic">Acessar</span>
                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-blue-50 group-hover:text-imac-blue transition-colors">
                        <i class="ph ph-arrow-right"></i>
                    </div>
                </div>
            </a>

        </div>
    </main>

    <!-- Rodapé -->
    <footer class="mt-auto py-6 text-center text-sm text-imac-subtext">
        <p>&copy; <span id="year"></span> Sistema de Gestão da Qualidade IMAC.</p>
    </footer>

    <!-- Script de Lógica -->
    <script>
        // Define o ano atual no rodapé
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
