                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pb-24">
                                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 md:col-span-2">
                                            <h2 className="font-black text-gray-800 mb-4 flex items-center gap-2 text-base"><i className="ph-fill ph-database text-imac-yellow text-2xl"></i> Backup e Restauração de Dados</h2>
                                            <p className="text-sm text-gray-500 font-bold mb-6">Salve um arquivo com todas as perguntas e inspeções no dispositivo, ou envie um antigo para nuvem.</p>
                                            <div className="flex flex-col md:flex-row gap-4">
                                                <button onClick={handleCreateBackup} className="flex-1 py-4 bg-gray-100 text-gray-700 font-black rounded-xl border border-gray-200 hover:bg-gray-200 flex items-center justify-center gap-2 transition-all">
                                                    <i className="ph ph-download-simple text-xl"></i> Fazer Download
                                                </button>
                                                <label className="flex-1 py-4 bg-gray-800 text-white font-black rounded-xl hover:bg-gray-700 flex items-center justify-center gap-2 cursor-pointer transition-all">
                                                    <i className="ph ph-upload-simple text-xl"></i> Enviar Restauração
                                                    <input type="file" accept=".json" className="hidden" onChange={handleRestoreBackup} />
                                                </label>
                                            </div>
                                        </div>

                                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                                            <h2 className="font-black text-gray-800 mb-4 flex items-center gap-2 text-base"><i className="ph-fill ph-database text-imac-yellow text-2xl"></i> Banco em Nuvem Ativo</h2>
                                            <div className="p-4 bg-green-50 border border-green-200 text-green-700 rounded-xl text-sm font-black flex items-center gap-2">
                                                <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> Conectado Seguro
                                            </div>
                                        </div>
                                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                                            <h2 className="font-black text-gray-800 mb-4 flex items-center gap-2 text-base"><i className="ph-fill ph-file-xls text-imac-yellow text-2xl"></i> Exportação Bruta</h2>
                                            <button onClick={handleExportCSV} className="w-full py-4 bg-green-600 text-white font-black rounded-xl shadow-sm hover:bg-green-700 flex items-center justify-center gap-2 transition-colors"><i className="ph ph-download-simple text-xl"></i> Baixar CSV</button>
                                        </div>
                                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 md:col-span-2">
                                            <h2 className="font-black text-gray-800 mb-4 flex items-center gap-2 text-base"><i className="ph-fill ph-image text-imac-yellow text-2xl"></i> Logo da Empresa (Relatórios)</h2>
                                            <label className="block w-full p-8 border-2 border-dashed border-gray-300 rounded-2xl text-center cursor-pointer hover:bg-gray-50 transition-colors">
                                                <input type="file" accept="image/*" onChange={handleLogoUpload} className="hidden" />
                                                {logo ? <img src={logo} className="h-16 mx-auto object-contain" /> : <div className="text-gray-400 flex flex-col items-center gap-2"><i className="ph ph-upload-simple text-3xl"></i><span className="text-sm font-black uppercase tracking-wide">Clique para enviar logo</span></div>}
                                            </label>
                                        </div>
                                    </div>
                                )}

                                {settingsTab === 'questions' && (
                                    <div className="space-y-6 pb-24">
                                        <div className="flex flex-col md:flex-row gap-4 items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                            <div className="relative flex-1 w-full">
                                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400"><i className="ph ph-magnifying-glass text-lg"></i></div>
                                                <input type="text" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} placeholder="Buscar pergunta, setor ou grupo..." className="w-full pl-12 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-imac-yellow focus:bg-white text-sm font-bold" />
                                            </div>
                                            <div className="flex-1 w-full">
                                                <select value={filterSector} onChange={(e) => setFilterSector(e.target.value)} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-imac-yellow focus:bg-white text-gray-600 font-bold uppercase text-sm">
                                                    <option value="">VER TODOS OS SETORES</option>
                                                    {allSetors.map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                            </div>
                                            <button onClick={() => setIsCloneModalOpen(true)} className="w-full md:w-auto px-5 py-3 bg-gray-800 text-white font-black rounded-xl flex items-center justify-center gap-2 hover:bg-gray-700 transition-colors text-sm">
                                                <i className="ph ph-copy text-lg"></i> Clonar Setor
                                            </button>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {questions.filter(q => {
                                                const matchSearch = q.pergunta.toLowerCase().includes(searchTerm.toLowerCase()) || q.setor.toLowerCase().includes(searchTerm.toLowerCase()) || q.grupo.toLowerCase().includes(searchTerm.toLowerCase());
                                                const matchSector = filterSector === '' || q.setor === filterSector;
                                                return matchSearch && matchSector;
                                            }).map(q => (
                                                <div key={q.id} className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-start hover:border-imac-yellow transition-colors group">
                                                    <div className="flex-1 pr-4">
                                                        <div className="flex gap-2 mb-3 flex-wrap">
                                                            <span className="text-[10px] bg-gray-100 text-gray-600 px-2 py-1 rounded-lg font-black uppercase tracking-wider">{q.setor}</span>

                                                <div className="bg-red-50 border border-red-200 p-4 rounded-xl text-center print:border-2">
                                                    <div className="text-[10px] font-black tracking-widest text-red-800 uppercase mb-1">Total Penalidades</div>
                                                    <div className="text-3xl font-black text-red-600">{data.totalNC}</div>
                                                </div>
                                            </div>

                                            {data.totalNC > 0 ? (
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                                    <div className="md:col-span-1">
                                                        <h3 className="font-black tracking-tight text-sm uppercase text-gray-800 border-b-2 border-gray-100 pb-2 mb-4">Gargalos (Tipo)</h3>
                                                        <table className="w-full text-sm border-collapse border border-gray-200 rounded-xl overflow-hidden">
                                                            <thead className="bg-gray-50 text-gray-400 text-[10px] tracking-widest uppercase">
                                                                <tr>
                                                                    <th className="p-3 text-left font-black border-b border-gray-200">Classificação</th>
                                                                    <th className="p-3 text-center font-black border-b border-gray-200">Qtd (NC)</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody className="divide-y divide-gray-100 bg-white">
                                                                {gruposNoSetor.map(([grupo, qtd]) => (
                                                                    <tr key={grupo}>
                                                                        <td className="p-3 font-bold text-gray-800 text-xs">{grupo}</td>
                                                                        <td className="p-3 text-center font-black text-red-600">{qtd}</td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    </div>

                                                    <div className="md:col-span-2">
                                                        <h3 className="font-black tracking-tight text-sm uppercase text-gray-800 border-b-2 border-gray-100 pb-2 mb-4 flex items-center gap-2"><i className="ph-fill ph-warning"></i> Detalhamento de Falhas</h3>
                                                        <div className="space-y-4">
                                                            {data.ncs.map((nc, idx) => (
                                                                <div key={idx} className="border-l-4 border-red-500 bg-gray-50 p-5 rounded-r-2xl shadow-sm print:border print:border-l-4 print:border-gray-300 no-break">
                                                                    <div className="flex gap-2 items-center mb-2">
                                                                        <span className="text-[10px] bg-white border border-gray-200 text-gray-600 px-2 py-1 rounded-lg font-black uppercase tracking-widest">{nc.grupo}</span>
                                                                        {nc.qty > 1 && <span className="text-[10px] bg-red-100 text-red-800 px-2 py-1 rounded-lg font-black uppercase tracking-widest">x{nc.qty} Penalidades</span>}
                                                                    </div>
                                                                    <p className="font-bold text-sm text-gray-900 leading-snug">{nc.pergunta}</p>
                                                                    <p className="text-xs font-bold text-gray-600 mt-3 bg-white p-3 border border-gray-200 rounded-xl"><span className="font-black text-gray-800">Apontamento:</span> {nc.obs || 'Sem observação.'}</p>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="bg-[#f0fdf4] border border-green-200 p-8 rounded-2xl text-center my-8 shadow-sm">
                                                    <div className="text-green-500 flex justify-center mb-4 scale-125"><i className="ph-fill ph-check-circle text-4xl"></i></div>
                                                    <p className="font-black text-green-700 text-xl mb-1 tracking-tight">Setor Livre de Não Conformidades!</p>
                                                    <p className="text-green-600 font-bold text-sm">Atingiu a conformidade máxima nas auditorias.</p>
                                                </div>
                                            )}

                                            <div className="mt-12 pt-6 border-t border-dashed border-gray-300 no-break">
                                                <h3 className="font-black text-[10px] tracking-widest uppercase text-gray-400 mb-4">Feedback e Plano (Líder do {setor})</h3>
                                                <div className="w-full h-24 bg-gray-50 border border-gray-200 rounded-2xl mb-8 print:border-black"></div>
                                                <div className="flex justify-between items-end px-4 md:px-10">
                                                    <div className="text-center w-40 md:w-64">
                                                        <div className="border-t-2 border-gray-900 pt-2 text-[10px] font-black uppercase tracking-widest text-gray-400">Data</div>
                                                    </div>
                                                    <div className="text-center w-40 md:w-64">
                                                        <div className="border-t-2 border-gray-900 pt-2 text-[10px] font-black uppercase tracking-widest text-gray-400">Assinatura ({setor})</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )})}

                                </div>
                            </div>
                        )}

                        {/* MODAIS GERAIS (Sobrepõem tudo) */}
                        {isModalOpen && (
                            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 modal-overlay backdrop-blur-sm">
                                <div className="bg-white border border-gray-100 rounded-2xl shadow-2xl w-full max-w-md p-8 animate-fade-in font-nunito">
                                    <h2 className="text-xl font-black mb-6 text-gray-900 uppercase tracking-tight">{editingQ ? 'Editar Pergunta' : 'Criar Nova Pergunta'}</h2>
                                    <form onSubmit={handleSaveQuestion} className="space-y-5">
                                        <div><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Setor Destino</label><input name="setor" defaultValue={editingQ?.setor || ''} list="setores-list" className="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:bg-white focus:border-imac-yellow transition-all font-black uppercase text-sm" required placeholder="Ex: ESTOQUE" /><datalist id="setores-list">{allSetors.map(s => <option key={s} value={s} />)}</datalist></div>
                                        <div><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Categoria</label><input name="grupo" defaultValue={editingQ?.grupo || ''} className="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:bg-white focus:border-imac-yellow transition-all font-black uppercase text-sm" required placeholder="Ex: LIMPEZA..." /></div>
                                        <div><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">A Pergunta</label><textarea name="pergunta" defaultValue={editingQ?.pergunta || ''} className="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl h-28 resize-none outline-none focus:bg-white focus:border-imac-yellow transition-all font-bold text-sm leading-relaxed" required placeholder="O que verificar?" /></div>
                                        
                                        <div className="flex gap-4 items-center bg-gray-50 p-4 rounded-xl border border-gray-200">
                                            <div className="w-1/3">
                                                <label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Peso (Pts)</label>
                                                <input type="number" name="weight" defaultValue={editingQ?.weight || 1} min="1" className="w-full p-3 bg-white border border-gray-300 rounded-lg outline-none focus:border-imac-yellow font-black text-center" />
                                            </div>
                                            <div className="flex-1 flex items-center justify-center gap-3 pt-4">
                                                <div className="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                                                    <input type="checkbox" name="critical" id="critical" defaultChecked={editingQ?.critical} className="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer" />
                                                    <label htmlFor="critical" className="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                                                </div>
                                                <label htmlFor="critical" className="text-xs font-black text-gray-800 uppercase tracking-widest cursor-pointer">Crítico</label>
                                            </div>
                                        </div>

                                        <div className="flex gap-3 pt-4"><button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 py-4 border border-gray-200 text-gray-600 rounded-xl font-black hover:bg-gray-50 transition-colors">Cancelar</button><button type="submit" className="flex-1 py-4 bg-imac-yellow text-white rounded-xl font-black hover:bg-yellow-500 shadow-sm transition-colors">Salvar</button></div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {isCloneModalOpen && (
                            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 modal-overlay backdrop-blur-sm">
                                <div className="bg-white border border-gray-100 rounded-2xl shadow-2xl w-full max-w-md p-8 animate-fade-in font-nunito">
                                    <div className="flex items-center gap-3 text-gray-900 mb-4">
                                        <div className="p-3 bg-gray-100 text-gray-600 rounded-xl"><i className="ph ph-copy text-xl"></i></div>
                                        <h2 className="text-xl font-black uppercase tracking-tight">Clonar Setor</h2>
                                    </div>
                                    <p className="text-sm text-gray-500 mb-8 font-bold leading-relaxed">Crie um novo setor, copiando automaticamente todas as perguntas de um setor existente (Espelho).</p>
                                    
                                    <form onSubmit={handleCloneSector} className="space-y-6">
                                        <div>
                                            <label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">1. Setor Espelho (Origem)</label>
                                            <select value={cloneSourceSector} onChange={e => setCloneSourceSector(e.target.value)} required className="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:bg-white focus:border-imac-yellow font-black uppercase text-sm">
                                                <option value="">Escolher...</option>
                                                {allSetors.map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">2. Nome do NOVO Setor</label>
                                            <input type="text" value={cloneTargetSector} onChange={e => setCloneTargetSector(e.target.value)} required placeholder="Ex: FILIAL 2" className="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:bg-white focus:border-imac-yellow uppercase font-black text-sm" />
                                        </div>
                                        
                                        <div className="flex gap-3 pt-4">
                                            <button type="button" onClick={() => setIsCloneModalOpen(false)} className="flex-1 py-4 border border-gray-200 text-gray-600 rounded-xl font-black hover:bg-gray-50 transition-colors">Cancelar</button>
                                            <button type="submit" className="flex-1 py-4 bg-gray-900 text-white rounded-xl font-black hover:bg-gray-800 shadow-sm transition-all active:scale-95 flex items-center justify-center gap-2"><i className="ph ph-copy text-lg"></i> Clonar</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                    </main>

                    {/* Footer */}
                    <footer className="mt-auto py-6 text-center text-sm text-imac-subtext no-print z-10 relative">
                        <p>&copy; {new Date().getFullYear()} Sistema de Gestão da Qualidade IMAC.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ToastProvider>
                <AppContent />
            </ToastProvider>
        );
    </script>
</body>
</html>
